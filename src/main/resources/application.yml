spring:
  application:
    name: stock-trading-simulator

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tradingapp}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ── JWT ──────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}                                   # required — min 256-bit HS256 key
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 min
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days

# ── Finnhub ──────────────────────────────────────────────────────
finnhub:
  api-key: ${FINNHUB_API_KEY}                             # required
  base-url: https://finnhub.io/api/v1

# ── Market price cache / scheduler ───────────────────────────────
market:
  price:
    cache-ttl-seconds: 60       # Redis TTL for stock:price:{SYMBOL}
    refresh-interval-ms: 60000  # how often the scheduler refreshes watchlisted symbols

# ── Server ───────────────────────────────────────────────────────
server:
  port: 8080

# ── Swagger UI ───────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# ── Actuator ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ──────────────────────────────────────────────────────
logging:
  level:
    com.tradingapp: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
